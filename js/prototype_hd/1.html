<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>继承</title>
  
</head>
<body>
   
    <script >
        //父类
        function Animal(name,age){
            this.name = name;
            this.age = age;
        }
        Animal.prototype.species = '动物';
        function Cat(name,age,color){
            //空对象{} <- this
            //构造函数式继承
            //手动制定 
            Animal.call(this,name,age);
            this.color = color;
            //Animal.apply(this,[name,age]);
            // console.log(this,'////');
        }
        // Cat.prototype = new Animal();//prototype模式
        // const cat = new Cat('加菲猫',2,'黄色');
        // console.log(cat.constructor);//cat实例的构造函数变为Animal的构造函数
        Cat.prototype = Animal.prototype;//直接继承prototype
        Cat.prototype.constructor = Cat;//修改原型上的构造函数
        const cat = new Cat('加菲猫',2,'黄色');
        console.log(cat.constructor,cat.species);//继承到了Animal的属性且构造函数不变
        console.log(Animal.prototype.constructor);//但是Animal原型的构造函数却指向了Cat
       //容易污染原型链
    </script>
</body>
</html>
