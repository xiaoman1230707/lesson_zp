<body>
    <script>
        function Animal(){
            this.species = '动物'

        }
        Animal.prototype = {
            sayHi:()=>{
                console.log('hi')
            }
        }
        function Cat(name,color){
            Animal.apply(this);
            this.name = name;
            this.color = color;
        }
        Cat.prototype = new Animal();
        const a = new Cat('小白猫','白色')
        a.sayHi()
        // console.log(a,a.__proto__)
    </script>
