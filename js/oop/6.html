<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>继承</title>
</head>
<body>
    <script>
        function Animal(){
        //this除了由运行的时候决定，还可以由调用时指定    
        //this绑定
        this.species = '动物'
        console.log(this,'///')
        }
        function Cat(name,color){
            //apply用于指定函数运行时this指向，被绑定了
            //第一个参数就是指定的this指向
            Animal.apply(this);//可以运行函数,指定函数内部的this 是cat实例
            this.name = name;
            this.color = color;
        }
        //怎么继承 父类的属性方法我都要有
        const cat = new Cat('加菲猫','橘色')
        console.log(cat)
    </script>
</body>
</html>
