<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //解决代码重复问题
        //封装了实例化的过程
        function Cat(name,color){
            // this 由运行时决定的
            console.log(this);//空对象开始
            this.name = name;//对象的实例化
            this.color = color;
        }
        //普通函数调用的时候，this指向window
        Cat('黑猫警长','黑色')//函数运行
        //new Object() 完全是个空对象{}
        //new运行时 this指向实例对象 空对象
        const cat1 = new Cat('小白猫','白色');
        const cat2 = new Cat('小白猫','白色');
        console.log(cat1.constructor == cat2.constructor);
        //实例判断是否是构造函数的实例
        console.log(cat1 instanceof Cat);
    </script>
</body>
</html>
