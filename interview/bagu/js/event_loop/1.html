<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
                console.log('同步代码 1');

        setTimeout(() => {
        console.log('setTimeout 1');
        Promise.resolve().then(() => {
            console.log('setTimeout 1 内部微任务');
        });
        }, 0);

        const promise1 = new Promise((resolve) => {
        console.log('Promise 构造函数');
        resolve();
        console.log('Promise 构造函数内 resolve 后');
        });

        promise1.then(() => {
        console.log('Promise.then 1');
        setTimeout(() => {
            console.log('Promise.then 1 内部 setTimeout');
        }, 0);
        });

        async function asyncFn() {
        console.log('async 函数同步部分');
        // 会把await 下面的所有代码 作为Promise.then 的回调函数 里的代码，只有await右边 的Promise resolve 后才会执行 
        await Promise.resolve(); // await 卡住，后面的不执行，下面代码不会执行 异步变同步的语法糖 本质为异步
        console.log('await 后微任务');
        }

        asyncFn();

        console.log('同步代码 2');
        // html5 里标准的微任务队列 立马将里面的函数 放到微任务队列 等待执行
        queueMicrotask(() => {
        console.log('queueMicrotask 微任务');
        });

        // 额外增加 DOM 监听类微任务（前端特有）
        const observer = new MutationObserver(() => {
        console.log('MutationObserver 微任务');
        });
        const div = document.createElement('div');
        observer.observe(div, { attributes: true });
        div.setAttribute('data-test', '1'); // 触发 MutationObserver 时 会将回调函数 放到微任务队列 等待执行
    </script>
</body>
</html>
