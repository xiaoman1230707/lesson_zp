<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .parent{
            width: 500px;
            height: 500px;
            background-color:pink;
            position:absolute;
            left: 200px;
            top: 200px;
            /* 不生效 */
        }
        .child{
            width: 300px;
            height: 200px;
            background-color:blue;
        }
        .box{
            width: 100px;
            height: 100px;
            background-color: green;
        }
    </style>
    <script>
        const oParent = document.querySelector('.parent');
        console.log(oParent)
        setTimeout(() => {
            oParent.style.position = 'static';
        }, 3000);
    </script>
</head>
<body>
    <div class="parent">
        <div class="child"></div>
    </div>
    <div class="box"></div>
</body>
</html>
