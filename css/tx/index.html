<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>triangle</title>
</head>
<body>
    <div class="triangle"></div>
    <div class="sector"></div>
    <style>
        .triangle{
            width: 20px;
            height: 20px;
            border: 100px solid transparent;
            border-bottom-color: red;
        }
        .sector{
            width: 200px;
            height: 200px;
            border-radius: 100px ;
            background-color: red;
        }
    </style>
</body>
</html>
